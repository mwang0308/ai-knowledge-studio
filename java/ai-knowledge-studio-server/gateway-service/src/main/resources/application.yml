server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: system-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/system/**,/api/knowledge/**,/api/internal/**
        - id: chat-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/chat/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"
