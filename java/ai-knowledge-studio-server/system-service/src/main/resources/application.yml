server:
  port: 8081

spring:
  application:
    name: system-service
  flyway:
    enabled: true
    validate-on-migrate: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_knowledge_studio?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:mwang1234}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:mwang1234}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9900}
    access-key: ${MINIO_ACCESS_KEY:minio}
    secret-key: ${MINIO_SECRET_KEY:minio1234}
    bucket-name: ${MINIO_BUCKET_NAME:rag-doc}

knowledge:
  document:
    max-file-size: ${DOCUMENT_MAX_FILE_SIZE:104857600}
    allowed-ext: pdf,doc,docx,xls,xlsx,csv,md,txt
  mq:
    document-process-exchange: knowledge.document.process.exchange
    document-parse-chunk-queue: knowledge.document.parse-chunk.queue
    document-parse-chunk-routing-key: document.parse.chunk
    callback-url: ${DOCUMENT_PROCESS_CALLBACK_URL:http://localhost:8081/api/internal/document-process/callback}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}]"

knife4j:
  enable: true
